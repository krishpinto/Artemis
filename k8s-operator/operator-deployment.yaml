apiVersion: v1
kind: ServiceAccount
metadata:
  name: artemis-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: artemis-operator-role
rules:
  - apiGroups: ["krishoperator.dev"]
    resources: ["apiservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["koordinator.sh", "kopf.dev"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: artemis-operator-binding
subjects:
  - kind: ServiceAccount
    name: artemis-operator
    namespace: default
roleRef:
  kind: ClusterRole
  name: artemis-operator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artemis-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artemis-operator
  template:
    metadata:
      labels:
        app: artemis-operator
    spec:
      serviceAccountName: artemis-operator
      containers:
        - name: artemis-operator
          image: asia-south1-docker.pkg.dev/project-45d8b0cf-b3bf-4fc3-a86/artemis/artemis-operator:latest